name: z15-bench

# SSH-dispatched benchmark on a real IBM z15 LPAR guest (linux1@148.100.85.193).
# Runs on standard ubuntu-24.04 amd64 GH runners — no s390x self-hosted runner
# required. The workflow SSHes into z15 via a dedicated ed25519 key stored as
# repo secrets, runs the s390x bench for every go-simd/go-asmgen kernel that
# has a stable release, and streams the raw output back to the GH Actions
# step-summary panel.
#
# Secrets required:
#   LINUX1_SSH_KEY      — the private key that authorises z15-ci-runner
#   LINUX1_KNOWN_HOSTS  — the host key fingerprint (populated via ssh-keyscan)
#
# Trigger: manual dispatch, or push touching this file, or scheduled weekly.
# Scheduled cadence is a light Sunday-morning sweep so we notice trend drift
# without spamming the shared LPAR every push.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/z15-bench.yml'
  schedule:
    - cron: '17 5 * * 0'  # Sundays 05:17 UTC

concurrency:
  group: z15-bench
  cancel-in-progress: false

jobs:
  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LINUX1_SSH_KEY }}

      - name: Trust the z15 host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LINUX1_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Bench sweep on real z15
        id: sweep
        run: |
          set -eo pipefail
          out=$(mktemp)
          ssh -o BatchMode=yes linux1@148.100.85.193 'bash -s' > "$out" <<'EOF'
          set -e
          export PATH=$HOME/goroot/bin:$PATH
          export GOROOT=$HOME/goroot
          export GOMODCACHE=$HOME/gomodcache
          mkdir -p ~/ci-bench
          for repo in matchlen popcount adler32 bitpack hex xxhash; do
            cd ~/ci-bench
            rm -rf $repo && mkdir $repo && cd $repo
            go mod init b > /dev/null 2>&1
            go get -t github.com/go-simd/$repo@latest > /dev/null 2>&1
            printf '\n== %s ==\n' "$repo"
            go test github.com/go-simd/$repo/... -run=^$ -bench=. -benchmem \
              -count=3 -benchtime=1s -timeout=300s 2>&1 | grep -E '^Benchmark|MB/s' | head -30
          done
          EOF
          cp "$out" bench.out
          wc -l bench.out

      - name: Publish summary
        run: |
          {
            echo "## z15 bench (real IBM z15 LPAR, Ubuntu 6.8, go1.26.4)"
            echo ""
            echo '```'
            cat bench.out
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: z15-bench-output
          path: bench.out
          retention-days: 90
